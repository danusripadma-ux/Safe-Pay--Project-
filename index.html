<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 15px;
}

.container {
  background: white;
  padding: 15px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  background: green;
  color: white;
  border: none;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="container">

<h2>Safe Pay</h2>

<!-- STEP 1: LIMIT FIRST -->
<input type="number" id="limit" placeholder="Set No-OTP Limit">

<!-- STEP 2: UPI -->
<input type="text" id="upi" placeholder="Enter UPI ID">
<button onclick="showUser()">Check Recipient</button>

<p id="userDetails"></p>

<!-- STEP 3: AMOUNT -->
<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="proceed()">Send Money</button>

<div id="otpBox" class="hidden">
  <p>OTP sent (Demo)</p>
  <input type="number" id="otpInput" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify</button>
</div>

<p id="result"></p>

</div>

<script>

let generatedOTP = "";

function showUser() {
  let upi = document.getElementById("upi").value;
  document.getElementById("userDetails").innerText =
    "Recipient: " + upi;
}

function proceed() {
  let amount = Number(document.getElementById("amount").value);
  let limit = Number(document.getElementById("limit").value);

  if (amount <= limit) {
    document.getElementById("result").innerText =
      "Payment Successful (No OTP required)";
  } else {
    generatedOTP = Math.floor(1000 + Math.random() * 9000);
    alert("OTP Sent (Demo): " + generatedOTP);
    document.getElementById("otpBox").classList.remove("hidden");
  }
}

function verifyOTP() {
  let otp = document.getElementById("otpInput").value;

  if (otp == generatedOTP) {
    document.getElementById("result").innerText =
      "Payment Successful";
  } else {
    document.getElementById("result").innerText =
      "Wrong OTP";
  }
}

</script>

</body>
</html>
