<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 15px;
}

.container {
  background: white;
  padding: 15px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h2>Safe Pay</h2>

<input type="text" id="upi" placeholder="Enter UPI ID">
<button onclick="showUser()">Check Recipient</button>

<p id="userDetails"></p>

<input type="number" id="limit" placeholder="Set No-OTP Limit">
<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="proceed()">Send Money</button>

<div id="otpBox" class="hidden">
  <p>OTP sent to recipient (Demo)</p>
  <input type="number" id="otpInput" placeholder="Enter OTP (valid 30 min)">
  <button onclick="verifyOTP()">Verify OTP</button>
</div>

<p id="result"></p>

</div>

<script>

let generatedOTP = "";

function showUser() {
  let upi = document.getElementById("upi").value;
  document.getElementById("userDetails").innerText =
    "Recipient: " + upi + " (Demo User)";
}

function proceed() {
  let amount = Number(document.getElementById("amount").value);
  let limit = Number(document.getElementById("limit").value);

  if (amount <= limit) {
    document.getElementById("result").innerText =
      "Payment Successful (No OTP required)";
  } else {
    generatedOTP = Math.floor(1000 + Math.random() * 9000);
    alert("OTP Sent (Demo): " + generatedOTP);

    document.getElementById("otpBox").classList.remove("hidden");
  }
}

function verifyOTP() {
  let userOtp = document.getElementById("otpInput").value;

  if (userOtp == generatedOTP) {
    document.getElementById("result").innerText =
      "Payment Successful with OTP";
  } else {
    document.getElementById("result").innerText =
      "Incorrect OTP. Payment Failed";
  }
}

</script>

</body>
</html>
